[databases]
; Gelen "recete" veritabani baglantilarini postgres:5432'ye yonlendir
recete = host=postgres port=5432 dbname=recete

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Kimlik dogrulama: userlist.txt dosyasindan oku (plain: Docker ic ag icin yeterli)
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Transaction modu: her transaction'da bir backend baglantisi kullanilir
; Session tabanlı SET/LISTEN gerektirmeyen servisler icin en verimli mod
pool_mode = transaction

; Servislerin PgBouncer'a acabilecegi maksimum toplam baglanti
max_client_conn = 1000

; PostgreSQL'e acilacak maksimum baglanti (veritabani + kullanici basi)
; 10 servis x max_client_conn >> default_pool_size PostgreSQL baglantilarini paylasir
default_pool_size = 30

; Minimum hazir baglanti sayisi (soguk baslangicta gecikmeyi onler)
min_pool_size = 5

; Bosta kalan backend baglantilarini kac saniyede kapat
server_idle_timeout = 600

; Istemci baglantisi ne kadar bekleyebilir (ms)
query_wait_timeout = 10000

; Log ayarlari
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Admin arabirimi
admin_users = recete
stats_users = recete
